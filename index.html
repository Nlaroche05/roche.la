<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nathan LaRoche Resume</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #f5f5f5;
      font-family: Arial, sans-serif;
    }

    .pdf-container {
      width: 100%;
      height: 100vh;
    }

    object {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    .fallback {
      text-align: center;
      padding: 20px;
    }

    .fallback a {
      color: #0066cc;
      text-decoration: none;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="pdf-container">
    <object data="Nathan-LaRoche-Resume.pdf" type="application/pdf">
      <div class="fallback">
        <p>Your browser could not display the resume inline.</p>
        <p><a href="Nathan-LaRoche-Resume.pdf" target="_blank" rel="noopener">Download the resume</a></p>
      </div>
    </object>
  </div>
</body>
</html>
